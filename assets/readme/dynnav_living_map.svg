<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient><radialGradient id="risk"><stop stop-color="#fb7185" stop-opacity=".75"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1400" height="620" rx="30" fill="url(#bg)"/><text x="58" y="64" fill="#f8fafc" font-family="Inter,Arial" font-size="34" font-weight="700">DynNav — a living map for uncertainty-aware rerouting</text><text x="58" y="98" fill="#94a3b8" font-family="Inter,Arial" font-size="17">Belief, risk, recoverability and mission supervision evolve together as the environment changes.</text><g transform="translate(55 135)"><rect width="820" height="420" rx="24" fill="#0b1628" stroke="#23314a"/><g stroke="#1e293b" stroke-width="1"><path d="M0 60H820M0 120H820M0 180H820M0 240H820M0 300H820M0 360H820"/><path d="M60 0V420M120 0V420M180 0V420M240 0V420M300 0V420M360 0V420M420 0V420M480 0V420M540 0V420M600 0V420M660 0V420M720 0V420M780 0V420"/></g><g fill="#334155"><rect x="120" y="60" width="60" height="180"/><rect x="300" y="0" width="60" height="120"/><rect x="480" y="240" width="60" height="180"/><rect x="660" y="120" width="60" height="120"/></g><circle cx="565" cy="185" r="130" fill="url(#risk)"/><circle cx="565" cy="185" r="56" fill="none" stroke="#fb7185" stroke-width="3" stroke-dasharray="8 8"/><circle cx="565" cy="185" r="14" fill="#fb7185" filter="url(#glow)"/><path d="M75 360 C190 330 260 270 360 255 S525 230 735 55" fill="none" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 14"/><path d="M75 360 C175 350 225 355 280 315 S390 190 455 170 S610 85 735 55" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/><path d="M360 255 C430 245 505 222 565 185" fill="none" stroke="#f59e0b" stroke-width="7" stroke-dasharray="10 10"/><circle cx="75" cy="360" r="17" fill="#34d399"/><circle cx="735" cy="55" r="17" fill="#a78bfa"/><path d="M280 315 l18 -8 -8 18" fill="#22d3ee"/><text x="48" y="398" fill="#6ee7b7" font-family="Inter,Arial" font-size="15" font-weight="700">ROBOT</text><text x="710" y="35" fill="#c4b5fd" font-family="Inter,Arial" font-size="15" font-weight="700">GOAL</text><text x="500" y="165" fill="#fecdd3" font-family="Inter,Arial" font-size="15" font-weight="700">DYNAMIC RISK</text><text x="365" y="285" fill="#fcd34d" font-family="Inter,Arial" font-size="14">blocked / unsafe route</text><text x="318" y="150" fill="#67e8f9" font-family="Inter,Arial" font-size="15" font-weight="700">RECOVERY-AWARE REROUTE</text></g><g transform="translate(920 145)" font-family="Inter,Arial"><rect width="420" height="400" rx="24" fill="#0b1628" stroke="#23314a"/><text x="30" y="48" fill="#f8fafc" font-size="24" font-weight="700">Closed-loop navigation reasoning</text><g><rect x="30" y="80" width="360" height="48" rx="14" fill="#0e7490"/><text x="210" y="110" text-anchor="middle" fill="#ecfeff" font-size="16" font-weight="700">Occupancy belief + uncertainty</text><path d="M210 128v24" stroke="#64748b" stroke-width="3"/><rect x="30" y="152" width="360" height="48" rx="14" fill="#6d28d9"/><text x="210" y="182" text-anchor="middle" fill="#f5f3ff" font-size="16" font-weight="700">Risk + recoverability fields</text><path d="M210 200v24" stroke="#64748b" stroke-width="3"/><rect x="30" y="224" width="360" height="48" rx="14" fill="#b45309"/><text x="210" y="254" text-anchor="middle" fill="#fffbeb" font-size="16" font-weight="700">Planner + rerouting trigger</text><path d="M210 272v24" stroke="#64748b" stroke-width="3"/><rect x="30" y="296" width="360" height="48" rx="14" fill="#be123c"/><text x="210" y="326" text-anchor="middle" fill="#fff1f2" font-size="16" font-weight="700">Mission supervisor</text><path d="M210 344v24" stroke="#64748b" stroke-width="3"/><text x="210" y="390" text-anchor="middle" fill="#86efac" font-size="17" font-weight="700">CONTINUE · REPLAN · SAFE MODE · STOP</text></g></g><text x="700" y="594" text-anchor="middle" fill="#64748b" font-family="Inter,Arial" font-size="14">Explanatory visual — not experimental evidence or a formal safety guarantee</text></svg>