mapping:
  frame_id: map
  resolution: 0.05
  width: 400
  height: 400
  origin_x: -10.0
  origin_y: -10.0
  inverse_sensor_model:
    prior_probability: 0.50
    free_probability: 0.30
    occupied_probability: 0.70
    minimum_probability: 0.03
    maximum_probability: 0.97
  dynamic_decay:
    enabled: true
    stale_after_seconds: 2.0
    half_life_seconds: 8.0
  export:
    free_threshold: 0.35
    occupied_threshold: 0.65
experiment:
  deterministic_seed: 17
  metrics:
    - scan_update_latency_ms
    - beams_processed
    - cells_updated
    - map_entropy
    - occupancy_iou
    - false_occupied_rate
    - false_free_rate
