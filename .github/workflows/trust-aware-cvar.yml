name: Trust-Aware CVaR Reproducibility Check

on:
  workflow_dispatch:
  push:
    paths:
      - 'research/trust_aware_cvar/**'
      - '.github/workflows/trust-aware-cvar.yml'

jobs:
  run-small-repro-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research/trust_aware_cvar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install numpy pandas scipy matplotlib; fi
      - name: Run small benchmark smoke test
        run: python -m benchmark.run_experiments --n_maps 2 --episodes_per_map 1 --size 10
      - name: Run analysis
        run: |
          python -m analysis.stats_analysis
          python -m analysis.plots
          python -m analysis.latex_tables
      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: trust-aware-cvar-generated-outputs
          path: |
            research/trust_aware_cvar/results/
            research/trust_aware_cvar/figures/
            research/trust_aware_cvar/tables/
