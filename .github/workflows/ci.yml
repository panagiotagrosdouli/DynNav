name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify full lint
        run: ruff check src/dynnav tests
      - name: Type-check mapping core
        run: >-
          mypy src/dynnav/mapping
          --strict
          --no-warn-unused-ignores
          --show-error-codes
      - name: Mapping module tests
        run: pytest -q tests/test_mapping_occupancy_grid.py
      - name: Full regression suite
        shell: bash
        run: |
          set +e
          pytest -x -q --tb=short > pytest.log 2>&1
          status=$?
          tail -n 100 pytest.log
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error title=Pytest failure (Python ${{ matrix.python-version }})::$line"
            done < <(tail -n 30 pytest.log)
          fi
          exit "$status"
      - name: Run all smoke test
        run: python scripts/run_all.py --config configs/default.yaml --smoke --out-dir results/ci_smoke
      - name: Benchmark smoke test
        run: python scripts/run_benchmarks.py --config configs/default.yaml --smoke --out-dir results/ci_benchmarks

  website:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install website dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check website
        run: npm run typecheck
      - name: Build website
        run: npm run build
