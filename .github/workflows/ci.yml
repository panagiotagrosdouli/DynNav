name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff stable modules
        run: |
          ruff check src/dynnav --exclude research_pipeline.py
          ruff check scripts/run_all.py scripts/run_benchmarks.py scripts/generate_figures.py scripts/make_demo_gif.py
      - name: Black stable modules
        run: |
          black --check src/dynnav scripts --exclude 'research_pipeline.py'
      - name: Pytest
        run: pytest
      - name: Run all smoke test
        run: python scripts/run_all.py --config configs/default.yaml --smoke --out-dir results/ci_smoke
      - name: Benchmark smoke test
        run: python scripts/run_benchmarks.py --config configs/default.yaml --smoke --out-dir results/ci_benchmarks
