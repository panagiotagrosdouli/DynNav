name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip uninstall -y dynnav || true
          python -m pip install -e ".[dev]"
          python -c "import dynnav, dynnav.mapping; print('dynnav:', dynnav.__file__); print('mapping:', dynnav.mapping.__file__)"
      - name: Verify research-grade mapping lint
        run: ruff check src/dynnav/mapping tests/test_mapping_occupancy_grid.py
      - name: Type-check mapping core
        run: >-
          mypy src/dynnav/mapping
          --strict
          --no-warn-unused-ignores
          --show-error-codes
      - name: Mapping module tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: python -m pytest -q tests/test_mapping_occupancy_grid.py
      - name: Full regression suite
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          set +e
          python -m pytest -x -q --tb=short --ignore=tests/test_mapping_occupancy_grid.py > pytest.log 2>&1
          status=$?
          tail -n 100 pytest.log
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error title=Pytest failure (Python ${{ matrix.python-version }})::$line"
            done < <(tail -n 30 pytest.log)
          fi
          exit "$status"
      - name: Run all smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: python scripts/run_all.py --config configs/default.yaml --smoke --out-dir results/ci_smoke
      - name: Benchmark smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}
        run: python scripts/run_benchmarks.py --config configs/default.yaml --smoke --out-dir results/ci_benchmarks

  website:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install website dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check website
        run: npm run typecheck
      - name: Build website
        run: npm run build
