name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Normalize formatting in runner
        run: |
          ruff check src/dynnav scripts tests --fix --unsafe-fixes || true
          black src/dynnav scripts tests
      - name: Verify stable modules
        run: |
          ruff check src/dynnav scripts tests
          black --check src/dynnav scripts tests
      - name: Pytest first failure
        run: pytest -x -q --tb=short
      - name: Run all smoke test
        run: python scripts/run_all.py --config configs/default.yaml --smoke --out-dir results/ci_smoke
      - name: Benchmark smoke test
        run: python scripts/run_benchmarks.py --config configs/default.yaml --smoke --out-dir results/ci_benchmarks
