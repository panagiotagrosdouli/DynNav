name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check src/dynnav scripts
      - name: Black
        run: black --check src/dynnav scripts
      - name: Pytest
        run: pytest
      - name: Benchmark smoke test
        run: dynnav-benchmark --config configs/benchmark.yaml --out-csv results/benchmarks/smoke.csv --summary results/benchmarks/smoke.md
