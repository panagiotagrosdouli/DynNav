name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall src scripts tests
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Type-check mapping core
        run: mypy src/dynnav/mapping --strict --no-warn-unused-ignores --show-error-codes

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify CLI entry points
        run: |
          dynnav-benchmark --help
          dynnav-demo --help
          python scripts/run_all.py --help
      - name: Default test suite
        run: pytest -q
      - name: Fast classified suite
        run: pytest -q -m "not slow and not ros2"
      - name: Deterministic smoke pipeline
        run: python scripts/run_all.py --mode smoke --config configs/default.yaml --out-dir results/ci_smoke
      - name: Repository validation
        run: python scripts/run_all.py --mode validate --config configs/default.yaml --out-dir results/ci_smoke
      - name: Validate generated smoke artifacts
        run: |
          test -s results/ci_smoke/metrics/metrics.csv
          test -s results/ci_smoke/metrics/summary.json
          test -s results/ci_smoke/figures/trajectory.png
          test -s results/ci_smoke/videos/dynnav_demo.gif
          test -s results/ci_smoke/reports/reproducibility_report.md
      - name: Upload smoke artifacts
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: dynnav-smoke-artifacts
          path: results/ci_smoke
          if-no-files-found: error

  website:
    name: Website production validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package.json
      - name: Install website dependencies
        run: npm install --no-audit --no-fund
      - name: Lint website
        run: npm run lint
      - name: Type-check website
        run: npm run typecheck
      - name: Test website
        run: npm run test
      - name: Build website
        run: npm run build
