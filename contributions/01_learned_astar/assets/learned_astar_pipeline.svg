<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Contribution 01 learned A star heuristic pipeline</title>
  <desc id="desc">Conceptual diagram showing state features, neural cost-to-go estimation, raw and Manhattan-clipped heuristic policies, A star search, and evaluation outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071426"/><stop offset="100%" stop-color="#17233f"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#7dd3fc"/></marker>
  </defs>
  <rect width="1600" height="760" rx="28" fill="url(#bg)"/>
  <circle cx="1460" cy="80" r="180" fill="#312e81" opacity="0.28"/><circle cx="100" cy="710" r="220" fill="#164e63" opacity="0.24"/>
  <text x="800" y="70" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="700">Contribution 01 — Learned Heuristics for A* Search</text>
  <text x="800" y="112" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">Learning search guidance while keeping admissibility assumptions explicit</text>
  <g filter="url(#shadow)">
    <rect x="65" y="205" width="260" height="270" rx="24" fill="#10233d" stroke="#4772a3" stroke-width="2"/>
    <rect x="375" y="205" width="260" height="270" rx="24" fill="#1a2345" stroke="#7c5fc4" stroke-width="2"/>
    <rect x="685" y="185" width="300" height="310" rx="24" fill="#20254a" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="1035" y="205" width="250" height="270" rx="24" fill="#132d44" stroke="#3d89ad" stroke-width="2"/>
    <rect x="1335" y="205" width="200" height="270" rx="24" fill="#10283d" stroke="#4ea3c7" stroke-width="2"/>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="195" y="250" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="700" letter-spacing="1.1">STATE FEATURES</text>
    <rect x="115" y="285" width="160" height="95" rx="14" fill="#081a2d" stroke="#60a5fa" stroke-width="2"/>
    <path d="M135 355 L165 325 L195 345 L225 300 L255 335" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <text x="195" y="410" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Goal geometry</text>
    <text x="195" y="440" text-anchor="middle" fill="#cbd5e1" font-size="17">Local obstacle context</text>

    <text x="505" y="250" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="700" letter-spacing="1.1">NEURAL ESTIMATOR</text>
    <circle cx="455" cy="320" r="19" fill="#7c3aed"/><circle cx="505" cy="295" r="19" fill="#8b5cf6"/><circle cx="505" cy="345" r="19" fill="#8b5cf6"/><circle cx="555" cy="320" r="19" fill="#a78bfa"/>
    <line x1="474" y1="320" x2="486" y2="300" stroke="#ddd6fe" stroke-width="3"/><line x1="474" y1="320" x2="486" y2="340" stroke="#ddd6fe" stroke-width="3"/><line x1="524" y1="300" x2="536" y2="320" stroke="#ddd6fe" stroke-width="3"/><line x1="524" y1="340" x2="536" y2="320" stroke="#ddd6fe" stroke-width="3"/>
    <text x="505" y="402" text-anchor="middle" fill="#f8fafc" font-size="25" font-weight="700">Predict hθ(n)</text>
    <text x="505" y="435" text-anchor="middle" fill="#cbd5e1" font-size="17">Estimated cost-to-go</text>

    <text x="835" y="230" text-anchor="middle" fill="#d8b4fe" font-size="18" font-weight="700" letter-spacing="1.1">HEURISTIC POLICY</text>
    <rect x="735" y="270" width="200" height="74" rx="16" fill="#150f2b" stroke="#a78bfa" stroke-width="2"/>
    <text x="835" y="300" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Raw mode</text>
    <text x="835" y="329" text-anchor="middle" fill="#c4b5fd" font-size="17">max(0, hθ)</text>
    <rect x="735" y="370" width="200" height="86" rx="16" fill="#0e2230" stroke="#38bdf8" stroke-width="2"/>
    <text x="835" y="400" text-anchor="middle" fill="#f8fafc" font-size="21" font-weight="700">Clipped mode</text>
    <text x="835" y="430" text-anchor="middle" fill="#bae6fd" font-size="16">min(max(0,hθ), hM)</text>
    <text x="835" y="478" text-anchor="middle" fill="#94a3b8" font-size="15">informativeness ↔ admissibility</text>

    <text x="1160" y="250" text-anchor="middle" fill="#7dd3fc" font-size="18" font-weight="700" letter-spacing="1.1">A* SEARCH</text>
    <text x="1160" y="325" text-anchor="middle" fill="#f8fafc" font-size="31" font-weight="700">f(n)=g(n)+h(n)</text>
    <path d="M1090 375 C1125 345,1150 420,1180 375 S1230 345,1255 390" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
    <text x="1160" y="430" text-anchor="middle" fill="#cbd5e1" font-size="18">Frontier ordering</text>

    <text x="1435" y="250" text-anchor="middle" fill="#7dd3fc" font-size="17" font-weight="700" letter-spacing="1">EVALUATION</text>
    <text x="1435" y="310" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Path cost</text>
    <text x="1435" y="350" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Expansions</text>
    <text x="1435" y="390" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Runtime</text>
    <text x="1435" y="430" text-anchor="middle" fill="#bae6fd" font-size="17">Audit violations</text>
  </g>
  <g stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"><line x1="325" y1="340" x2="360" y2="340"/><line x1="635" y1="340" x2="670" y2="340"/><line x1="985" y1="340" x2="1020" y2="340"/><line x1="1285" y1="340" x2="1320" y2="340"/></g>
  <rect x="145" y="565" width="1310" height="112" rx="22" fill="#091b2d" stroke="#304b68" stroke-width="2"/>
  <text x="800" y="607" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Scientific distinction</text>
  <text x="800" y="645" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Fewer expanded nodes do not by themselves establish admissibility, optimality, or lower wall-clock runtime.</text>
  <text x="800" y="708" text-anchor="middle" fill="#7f96ad" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Conceptual overview — not experimental evidence and not a formal guarantee</text>
</svg>