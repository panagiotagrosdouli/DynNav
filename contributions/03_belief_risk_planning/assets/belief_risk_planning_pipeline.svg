<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc"><title id="title">Contribution 03 belief-space and risk-aware planning pipeline</title><desc id="desc">Conceptual diagram from calibrated uncertainty and risk maps to route metrics, scalarization, Pareto analysis, and risk-aware route selection.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071426"/><stop offset="100%" stop-color="#15322f"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#7dd3fc"/></marker></defs><rect width="1600" height="760" rx="28" fill="url(#bg)"/><circle cx="1450" cy="80" r="180" fill="#14532d" opacity=".25"/><circle cx="90" cy="700" r="220" fill="#164e63" opacity=".22"/><text x="800" y="70" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="42" font-weight="700">Contribution 03 — Belief-Space &amp; Risk-Aware Planning</text><text x="800" y="112" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial" font-size="21">Selecting routes through an explicit safety–efficiency trade-off</text><g filter="url(#s)"><rect x="65" y="205" width="260" height="270" rx="24" fill="#102b35" stroke="#3f8f91" stroke-width="2"/><rect x="375" y="205" width="260" height="270" rx="24" fill="#12352d" stroke="#3fa46f" stroke-width="2"/><rect x="685" y="185" width="300" height="310" rx="24" fill="#163a34" stroke="#34d399" stroke-width="2"/><rect x="1035" y="205" width="250" height="270" rx="24" fill="#143047" stroke="#3b82a8" stroke-width="2"/><rect x="1335" y="205" width="200" height="270" rx="24" fill="#122b3d" stroke="#4ea3c7" stroke-width="2"/></g><g font-family="Inter,Segoe UI,Arial"><text x="195" y="250" text-anchor="middle" fill="#99f6e4" font-size="18" font-weight="700">BELIEF INPUT</text><text x="195" y="315" text-anchor="middle" fill="#f8fafc" font-size="23" font-weight="700">Calibrated σ</text><text x="195" y="355" text-anchor="middle" fill="#f8fafc" font-size="21">Occupancy belief</text><text x="195" y="395" text-anchor="middle" fill="#cbd5e1" font-size="17">From C02</text><text x="505" y="250" text-anchor="middle" fill="#86efac" font-size="18" font-weight="700">RISK FIELD</text><path d="M430 380 C460 300 500 420 535 310 C560 250 595 355 615 290" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/><text x="505" y="420" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Spatial risk map</text><text x="505" y="450" text-anchor="middle" fill="#cbd5e1" font-size="16">uncertainty + hazard</text><text x="835" y="230" text-anchor="middle" fill="#86efac" font-size="18" font-weight="700">ROUTE METRICS</text><text x="835" y="295" text-anchor="middle" fill="#f8fafc" font-size="21">Expected risk</text><text x="835" y="335" text-anchor="middle" fill="#f8fafc" font-size="21">Maximum risk</text><text x="835" y="375" text-anchor="middle" fill="#f8fafc" font-size="21">CVaR tail risk</text><text x="835" y="415" text-anchor="middle" fill="#f8fafc" font-size="21">Path length</text><text x="835" y="460" text-anchor="middle" fill="#a7f3d0" font-size="17">Pareto audit</text><text x="1160" y="250" text-anchor="middle" fill="#7dd3fc" font-size="18" font-weight="700">OBJECTIVE</text><text x="1160" y="325" text-anchor="middle" fill="#f8fafc" font-size="31" font-weight="700">J = L + λR</text><text x="1160" y="375" text-anchor="middle" fill="#cbd5e1" font-size="18">Risk aversion λ</text><text x="1160" y="415" text-anchor="middle" fill="#cbd5e1" font-size="18">Candidate ranking</text><text x="1435" y="250" text-anchor="middle" fill="#7dd3fc" font-size="17" font-weight="700">SELECTED PATH</text><path d="M1375 390 C1390 340 1410 370 1425 315 S1470 300 1495 350" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/><text x="1435" y="430" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Measured trade-off</text></g><g stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#a)"><line x1="325" y1="340" x2="360" y2="340"/><line x1="635" y1="340" x2="670" y2="340"/><line x1="985" y1="340" x2="1020" y2="340"/><line x1="1285" y1="340" x2="1320" y2="340"/></g><rect x="145" y="565" width="1310" height="112" rx="22" fill="#091d2a" stroke="#2e5662" stroke-width="2"/><text x="800" y="607" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="24" font-weight="700">Scientific distinction</text><text x="800" y="645" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial" font-size="20">Lower estimated risk is not a formal safety guarantee; it is an auditable planning preference.</text><text x="800" y="708" text-anchor="middle" fill="#7f96ad" font-family="Inter,Segoe UI,Arial" font-size="16">Conceptual overview — not experimental evidence and not a certified safety claim</text></svg>