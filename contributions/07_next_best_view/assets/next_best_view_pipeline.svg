<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">Contribution 07 returnability-aware next-best-view pipeline</title><desc id="desc">Conceptual diagram showing candidate viewpoints evaluated by information gain, travel cost, path risk, returnability, and connectivity before viewpoint selection.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071426"/><stop offset="100%" stop-color="#213044"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#7fc8ff"/></marker></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f5f9ff" font-family="Arial,sans-serif" font-size="40" font-weight="700">Contribution 07 — Returnability-Aware Next-Best View</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial,sans-serif" font-size="21">Active exploration that balances information gain with operational safety margins</text><g font-family="Arial,sans-serif"><rect x="55" y="190" width="280" height="250" rx="24" fill="#102f4c" stroke="#4d83ad" stroke-width="2"/><text x="195" y="235" text-anchor="middle" fill="#9ed3ff" font-size="18" font-weight="700">MAP &amp; FRONTIERS</text><text x="195" y="300" text-anchor="middle" fill="#f4f8fc" font-size="25" font-weight="700">Unknown space</text><text x="195" y="345" text-anchor="middle" fill="#b7c9dc" font-size="20">Candidate viewpoints</text><text x="195" y="385" text-anchor="middle" fill="#b7c9dc" font-size="20">Sensor opportunity</text><rect x="390" y="190" width="280" height="250" rx="24" fill="#123649" stroke="#45a79c" stroke-width="2"/><text x="530" y="235" text-anchor="middle" fill="#8ee8dd" font-size="18" font-weight="700">INFORMATION VALUE</text><text x="530" y="305" text-anchor="middle" fill="#f4f8fc" font-size="25" font-weight="700">Information gain</text><text x="530" y="355" text-anchor="middle" fill="#b7c9dc" font-size="20">Expected map reduction</text><text x="530" y="397" text-anchor="middle" fill="#b7c9dc" font-size="20">Entropy-driven utility</text><rect x="725" y="160" width="350" height="310" rx="24" fill="#143b43" stroke="#51d6a7" stroke-width="2"/><text x="900" y="205" text-anchor="middle" fill="#8ef0d5" font-size="18" font-weight="700">OPERATIONAL AUDIT</text><text x="900" y="260" text-anchor="middle" fill="#f4f8fc" font-size="22">Travel cost</text><text x="900" y="302" text-anchor="middle" fill="#f4f8fc" font-size="22">Path risk</text><text x="900" y="344" text-anchor="middle" fill="#f4f8fc" font-size="22">Returnability</text><text x="900" y="386" text-anchor="middle" fill="#f4f8fc" font-size="22">Connectivity</text><text x="900" y="430" text-anchor="middle" fill="#b7c9dc" font-size="18">Classic score vs safe score</text><rect x="1130" y="190" width="300" height="250" rx="24" fill="#173548" stroke="#65a7ff" stroke-width="2"/><text x="1280" y="235" text-anchor="middle" fill="#9ed3ff" font-size="18" font-weight="700">VIEWPOINT SELECTION</text><text x="1280" y="305" text-anchor="middle" fill="#f4f8fc" font-size="25" font-weight="700">Select candidate</text><text x="1280" y="350" text-anchor="middle" fill="#b7c9dc" font-size="20">Navigate and observe</text><text x="1280" y="392" text-anchor="middle" fill="#b7c9dc" font-size="20">Update map</text></g><g stroke="#7fc8ff" stroke-width="4" fill="none" marker-end="url(#arrow)"><line x1="335" y1="315" x2="375" y2="315"/><line x1="670" y1="315" x2="710" y2="315"/><line x1="1075" y1="315" x2="1115" y2="315"/></g><rect x="160" y="545" width="1280" height="100" rx="22" fill="#0a1d30" stroke="#244c6b" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f4f8fc" font-family="Arial,sans-serif" font-size="23" font-weight="700">Scientific distinction</text><text x="800" y="620" text-anchor="middle" fill="#b9cde0" font-family="Arial,sans-serif" font-size="19">A high-information viewpoint is not automatically the safest or most recoverable viewpoint.</text><text x="800" y="686" text-anchor="middle" fill="#7994aa" font-family="Arial,sans-serif" font-size="16">Conceptual overview — not experimental evidence or a safety guarantee</text></svg>