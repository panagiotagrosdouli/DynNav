<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc"><title id="title">Contribution 04 recoverability and returnability pipeline</title><desc id="desc">Conceptual diagram showing candidate paths, returnability checks, recoverability metrics, irreversibility thresholds, and navigation decisions.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071426"/><stop offset="100%" stop-color="#312018"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient><filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#7dd3fc"/></marker></defs><rect width="1600" height="760" rx="28" fill="url(#bg)"/><circle cx="1450" cy="80" r="180" fill="#7c2d12" opacity=".2"/><circle cx="90" cy="700" r="220" fill="#164e63" opacity=".22"/><text x="800" y="70" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="42" font-weight="700">Contribution 04 — Returnability, Irreversibility &amp; Recoverability</text><text x="800" y="112" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial" font-size="21">Evaluating whether a feasible move preserves future recovery freedom</text><g filter="url(#s)"><rect x="65" y="205" width="260" height="270" rx="24" fill="#20283a" stroke="#64748b" stroke-width="2"/><rect x="375" y="205" width="260" height="270" rx="24" fill="#302819" stroke="#b7791f" stroke-width="2"/><rect x="685" y="185" width="300" height="310" rx="24" fill="#35291a" stroke="#f59e0b" stroke-width="2"/><rect x="1035" y="205" width="250" height="270" rx="24" fill="#2d2730" stroke="#a66f8d" stroke-width="2"/><rect x="1335" y="205" width="200" height="270" rx="24" fill="#132b3d" stroke="#4ea3c7" stroke-width="2"/></g><g font-family="Inter,Segoe UI,Arial"><text x="195" y="250" text-anchor="middle" fill="#cbd5e1" font-size="18" font-weight="700">CANDIDATE</text><path d="M115 380 C145 320 180 365 205 295 S255 310 275 350" fill="none" stroke="#94a3b8" stroke-width="7" stroke-linecap="round"/><text x="195" y="425" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">State or route</text><text x="505" y="250" text-anchor="middle" fill="#fcd34d" font-size="18" font-weight="700">RETURNABILITY</text><text x="505" y="315" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Path to safe base?</text><text x="505" y="360" text-anchor="middle" fill="#f8fafc" font-size="19">Return distance</text><text x="505" y="405" text-anchor="middle" fill="#fde68a" font-size="18">Binary feasibility</text><text x="835" y="230" text-anchor="middle" fill="#fcd34d" font-size="18" font-weight="700">RECOVERABILITY PROFILE</text><text x="835" y="290" text-anchor="middle" fill="#f8fafc" font-size="20">Escape options</text><text x="835" y="330" text-anchor="middle" fill="#f8fafc" font-size="20">Obstacle margin</text><text x="835" y="370" text-anchor="middle" fill="#f8fafc" font-size="20">Bottleneck score</text><text x="835" y="410" text-anchor="middle" fill="#f8fafc" font-size="20">Return quality</text><text x="835" y="458" text-anchor="middle" fill="#fde68a" font-size="18">I = 1 − R</text><text x="1160" y="250" text-anchor="middle" fill="#e9a8c5" font-size="18" font-weight="700">DECISION POLICY</text><text x="1160" y="315" text-anchor="middle" fill="#f8fafc" font-size="22">Threshold τ</text><text x="1160" y="360" text-anchor="middle" fill="#f8fafc" font-size="19">Penalty / rejection</text><text x="1160" y="405" text-anchor="middle" fill="#f9a8d4" font-size="18">Minimal safe relaxation</text><text x="1435" y="250" text-anchor="middle" fill="#7dd3fc" font-size="17" font-weight="700">ACTION</text><text x="1435" y="305" text-anchor="middle" fill="#f8fafc" font-size="19">Allow</text><text x="1435" y="345" text-anchor="middle" fill="#f8fafc" font-size="19">Penalize</text><text x="1435" y="385" text-anchor="middle" fill="#f8fafc" font-size="19">Reroute</text><text x="1435" y="425" text-anchor="middle" fill="#bae6fd" font-size="19">Safe mode</text></g><g stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#a)"><line x1="325" y1="340" x2="360" y2="340"/><line x1="635" y1="340" x2="670" y2="340"/><line x1="985" y1="340" x2="1020" y2="340"/><line x1="1285" y1="340" x2="1320" y2="340"/></g><rect x="145" y="565" width="1310" height="112" rx="22" fill="#111c2a" stroke="#4b5563" stroke-width="2"/><text x="800" y="607" text-anchor="middle" fill="#f8fafc" font-family="Inter,Segoe UI,Arial" font-size="24" font-weight="700">Scientific distinction</text><text x="800" y="645" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial" font-size="20">Collision-free feasibility does not imply that future escape, return, or recovery remains available.</text><text x="800" y="708" text-anchor="middle" fill="#7f96ad" font-family="Inter,Segoe UI,Arial" font-size="16">Conceptual overview — not experimental evidence and not a formal safety certificate</text></svg>