<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc"><title id="title">Contribution 06 energy and connectivity-aware planning pipeline</title><desc id="desc">Conceptual diagram showing route evaluation under battery reserve and communication constraints, followed by direct, recharge, relay, combined-support, or infeasible mission verdicts.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#071426"/><stop offset="100%" stop-color="#183248"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#51d6a7"/><stop offset="100%" stop-color="#65a7ff"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#7fc8ff"/></marker></defs><rect width="1600" height="720" rx="28" fill="url(#bg)"/><text x="800" y="68" text-anchor="middle" fill="#f5f9ff" font-family="Arial,sans-serif" font-size="40" font-weight="700">Contribution 06 — Energy &amp; Connectivity-Aware Planning</text><text x="800" y="108" text-anchor="middle" fill="#b7c9dc" font-family="Arial,sans-serif" font-size="21">Mission feasibility under battery reserve and communication constraints</text><g font-family="Arial,sans-serif"><g><rect x="70" y="190" width="300" height="250" rx="24" fill="#102f4c" stroke="#4d83ad" stroke-width="2"/><text x="220" y="235" text-anchor="middle" fill="#9ed3ff" font-size="18" font-weight="700">MISSION INPUTS</text><text x="220" y="292" text-anchor="middle" fill="#f4f8fc" font-size="25" font-weight="700">Candidate route</text><text x="220" y="334" text-anchor="middle" fill="#b7c9dc" font-size="20">Battery budget</text><text x="220" y="367" text-anchor="middle" fill="#b7c9dc" font-size="20">Reserve requirement</text><text x="220" y="400" text-anchor="middle" fill="#b7c9dc" font-size="20">Connectivity threshold</text></g><g><rect x="455" y="190" width="300" height="250" rx="24" fill="#123649" stroke="#45a79c" stroke-width="2"/><text x="605" y="235" text-anchor="middle" fill="#8ee8dd" font-size="18" font-weight="700">RESOURCE AUDIT</text><text x="605" y="292" text-anchor="middle" fill="#f4f8fc" font-size="24" font-weight="700">Energy margin</text><text x="605" y="328" text-anchor="middle" fill="#b7c9dc" font-size="18">usable − required</text><text x="605" y="372" text-anchor="middle" fill="#f4f8fc" font-size="24" font-weight="700">Link margin</text><text x="605" y="408" text-anchor="middle" fill="#b7c9dc" font-size="18">minimum − required</text></g><g><rect x="840" y="190" width="300" height="250" rx="24" fill="#143b43" stroke="#51d6a7" stroke-width="2"/><text x="990" y="235" text-anchor="middle" fill="#8ef0d5" font-size="18" font-weight="700">SUPPORT OPTIONS</text><text x="990" y="294" text-anchor="middle" fill="#f4f8fc" font-size="24" font-weight="700">Recharge available?</text><text x="990" y="340" text-anchor="middle" fill="#f4f8fc" font-size="24" font-weight="700">Relay available?</text><text x="990" y="392" text-anchor="middle" fill="#b7c9dc" font-size="18">Operational mitigation</text></g><g><rect x="1225" y="160" width="305" height="310" rx="24" fill="#173548" stroke="#65a7ff" stroke-width="2"/><text x="1377" y="205" text-anchor="middle" fill="#9ed3ff" font-size="18" font-weight="700">MISSION VERDICT</text><text x="1377" y="255" text-anchor="middle" fill="#f4f8fc" font-size="20">Direct feasible</text><text x="1377" y="295" text-anchor="middle" fill="#f4f8fc" font-size="20">Needs recharge</text><text x="1377" y="335" text-anchor="middle" fill="#f4f8fc" font-size="20">Needs relay</text><text x="1377" y="375" text-anchor="middle" fill="#f4f8fc" font-size="20">Needs both</text><text x="1377" y="415" text-anchor="middle" fill="#f4f8fc" font-size="20">Infeasible</text></g></g><g stroke="#7fc8ff" stroke-width="4" fill="none" marker-end="url(#arrow)"><line x1="370" y1="315" x2="440" y2="315"/><line x1="755" y1="315" x2="825" y2="315"/><line x1="1140" y1="315" x2="1210" y2="315"/></g><rect x="160" y="545" width="1280" height="100" rx="22" fill="#0a1d30" stroke="#244c6b" stroke-width="2"/><text x="800" y="585" text-anchor="middle" fill="#f4f8fc" font-family="Arial,sans-serif" font-size="23" font-weight="700">Scientific distinction</text><text x="800" y="620" text-anchor="middle" fill="#b9cde0" font-family="Arial,sans-serif" font-size="19">Resource feasibility is an operational planning criterion; it is not a collision-avoidance or formal safety guarantee.</text><text x="800" y="686" text-anchor="middle" fill="#7994aa" font-family="Arial,sans-serif" font-size="16">Conceptual overview — not experimental evidence</text></svg>